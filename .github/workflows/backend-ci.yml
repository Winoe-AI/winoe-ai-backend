name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}
  ENV: ci
  TENON_AUTH0_DOMAIN: tenon.us.auth0.com
  TENON_AUTH0_ISSUER: https://tenon.us.auth0.com/
  TENON_AUTH0_JWKS_URL: https://tenon.us.auth0.com/.well-known/jwks.json
  TENON_AUTH0_API_AUDIENCE: https://tenon.ai/api
  TENON_AUTH0_ALGORITHMS: RS256
  TENON_AUTH0_CLAIM_NAMESPACE: https://tenon.ai

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install -U pip

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check . --output-format=github

      - name: Ruff format check
        run: poetry run ruff format --check .

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TENON_DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/tenon_test
      TENON_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tenon_test

    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install -U pip

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Alembic migrations
        run: poetry run alembic upgrade heads

      - name: Run tests
        run: poetry run pytest

  perf-hotpaths:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenon_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tenon_perf
      TENON_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tenon_perf
      TENON_DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/tenon_perf

    steps:
      - uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install -U pip

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Perf Capture (required endpoints)
        run: >
          poetry run python scripts/perf_capture_from_tests.py
          --output code-quality/performance/perf_hotpaths_capture.json
          --tests tests/integration/api/test_admin_demo_ops.py tests/integration/api/test_candidate_invites.py tests/integration/api/test_candidate_session_schedule.py tests/integration/api/test_task_submit.py tests/integration/api/test_simulations_list.py
          --required-endpoints code-quality/performance/config/perf_required_endpoints.json
          --fail-on-missing-required

      - name: Run Perf Hotpath Load Scenarios
        run: >
          poetry run python scripts/perf_hotpath_load.py
          --output code-quality/performance/perf_hotpath_load_summary.json
          --markdown-output code-quality/performance/perf_hotpath_load_summary.md
          --scenario-manifest code-quality/performance/config/perf_load_scenarios.json

      - name: Enforce Perf Guardrails
        run: >
          poetry run python scripts/perf_guardrails.py
          --capture code-quality/performance/perf_hotpaths_capture.json
          --load-summary code-quality/performance/perf_hotpath_load_summary.json
          --budgets code-quality/performance/config/hotpath_query_budgets.json
          --output code-quality/performance/perf_hotpath_guardrails.json

      - name: Upload Perf Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-hotpaths
          path: |
            code-quality/performance/perf_hotpaths_capture.json
            code-quality/performance/perf_hotpath_load_summary.json
            code-quality/performance/perf_hotpath_load_summary.md
            code-quality/performance/perf_hotpath_guardrails.json
